<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h3>Contact Page</h3>
        <nav>
            <ul>
                <li><a href="home">Home</a></li>           
                <li><a href="contact">Week 2</a></li>
            </ul>    
        </nav>
    </header>
<main>
    <section id="contact">
        <h2>Contact Us</h2>
        <p>Please fill out the form below to get in touch with us:</p>
        <form action="#" method=""post">
            <label for="name">Name:</label>
            <input 
                type="text" 
                id="name" 
                name="name"
                required >
                <br><br>
            <label for="email">Email:</label>
            <input 
                type="email" 
                id="email" 
                name="email">
                <br><br>       
            <label for="phone">Phone:</label>
            <input 
                type="tel" 
                id="phone" 
                name="phone"
                required 
                pattern ="[0-9]{10}"
                maxlength="10"
                title="Please enter a valid"> 
                <br><br>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea><br><br>
        <fieldset>
            <legend>Preferred Contach Method</legend>
            <input 
                type="radio" 
                id="email" 
                name="contact-method" 
                value="email" checked>
            <label for="email">Email</label><br>
            <input 
                type="radio" 
                id="phone" 
                name="contact-method" 
                value="phone">
            <label for="phone">Phone</label><br>
        </fieldset> 
        
        <input type="submit" value="Submit">
        <input type="reset" value="Cancel">
        
    </form>
   </section>
</main>



</body>
</html>
